<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 280" role="img" aria-labelledby="title desc">
  <title id="title">Chronos Logo</title>
  <desc id="desc">Chronos job queue and task scheduler logo with a clock icon and text.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b132b"/>
      <stop offset="100%" stop-color="#1c2541"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a86ff"/>
      <stop offset="100%" stop-color="#00c2a8"/>
    </linearGradient>
  </defs>

  <rect x="8" y="8" width="944" height="264" rx="26" fill="url(#bg)"/>
  <rect x="8" y="8" width="944" height="264" rx="26" fill="none" stroke="#2d3b6b" stroke-width="2"/>

  <g transform="translate(56,52)">
    <circle cx="88" cy="88" r="68" fill="none" stroke="url(#accent)" stroke-width="12"/>
    <circle cx="88" cy="88" r="6" fill="#dff6ff"/>
    <line x1="88" y1="88" x2="88" y2="49" stroke="#dff6ff" stroke-width="10" stroke-linecap="round"/>
    <line x1="88" y1="88" x2="122" y2="102" stroke="#dff6ff" stroke-width="10" stroke-linecap="round"/>

    <rect x="172" y="44" width="26" height="22" rx="6" fill="#4cc9f0"/>
    <rect x="204" y="44" width="26" height="22" rx="6" fill="#4895ef"/>
    <rect x="236" y="44" width="26" height="22" rx="6" fill="#4361ee"/>

    <rect x="172" y="76" width="58" height="22" rx="6" fill="#4cc9f0"/>
    <rect x="236" y="76" width="26" height="22" rx="6" fill="#4895ef"/>

    <rect x="172" y="108" width="26" height="22" rx="6" fill="#4cc9f0"/>
    <rect x="204" y="108" width="26" height="22" rx="6" fill="#4895ef"/>
    <rect x="236" y="108" width="26" height="22" rx="6" fill="#4361ee"/>
  </g>

  <text x="356" y="116" fill="#f5f7ff" font-family="Segoe UI, Verdana, sans-serif" font-size="72" font-weight="700" letter-spacing="1">CHRONOS</text>
  <text x="358" y="166" fill="#a5b4d4" font-family="Segoe UI, Verdana, sans-serif" font-size="24" font-weight="600" letter-spacing="2">JOB QUEUE AND TASK SCHEDULER</text>
</svg>
